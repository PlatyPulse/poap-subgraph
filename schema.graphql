# Custom Entities

type UserAsset @entity {
  id: ID! #userportoflio address OR token id
  owner: Account!
  portfolio: Portfolio!
  type: String! # "veNFT" or "x33"
  votes: [Vote!]!
  amount: BigInt!
  isManual: Boolean!
  isCollateral: Boolean!
}

# stats

type Stats @entity {
  id: ID! # stats-epoch
  epoch: BigInt!
  totalBorrows: BigInt!
  totalTopups: BigInt!
  totalManualRepayments: BigInt!
  totalAutomaticRepayments: BigInt!
  totalLoanPaids: BigInt!
  totalGasReclamationPaids: BigInt!
  totalProtocolFeePaids: BigInt!
  totalZeroBalanceFeePaids: BigInt!
  totalLenderPremiumPaids: BigInt!
  totalRewardsProcesseds: BigInt!
  totalPaidToRecipients: BigInt!
  totalInvestedToVaults: BigInt!
  totalZeroBalanceRewardsProcesseds: BigInt!
}