# Custom Entities

type UserAsset @entity {
  id: ID! #userportoflio address OR token id
  owner: Account!
  portfolio: Portfolio!
  type: String! # "veNFT" or "x33"
  votes: [Vote!]! @derivedFrom(field: "userAsset")
  amount: BigInt!
  isManual: Boolean!
  isCollateral: Boolean!
}

# stats

type GlobalStats @entity {
  id: ID! # "global"
  # Users & Portfolios
  totalUsers: BigInt!
  totalPortfolios: BigInt!
  # veNFT tracking
  totalVeNftDeposited: BigInt!       # all-time veNFTs deposited
  totalVeNftValue: BigInt!           # all-time underlying value deposited
  currentVeNft: BigInt!              # current veNFTs held
  currentVeNftValue: BigInt!         # current underlying value held
  # Marketplace (counts only, volume is per-token)
  totalListings: BigInt!
  totalSales: BigInt!
  activeListings: BigInt!
  # Token-specific stats
  tokenStats: [GlobalTokenStats!]! @derivedFrom(field: "globalStats")
  # Timestamps
  lastUpdatedAt: BigInt!
}

type GlobalTokenStats @entity {
  id: ID! # "global-{tokenAddress}"
  globalStats: GlobalStats!
  token: Bytes!
  # Lending
  totalBorrowed: BigInt!
  currentBorrowed: BigInt!
  totalRepaid: BigInt!
  # Rewards
  totalRewards: BigInt!
  # Marketplace
  totalSalesVolume: BigInt!
}

type EpochStats @entity {
  id: ID! # epoch timestamp as string
  epoch: BigInt!
  # Users & Portfolios
  newUsers: BigInt!
  newPortfolios: BigInt!
  # veNFT tracking
  veNftDeposited: BigInt!
  veNftValueDeposited: BigInt!
  veNftWithdrawn: BigInt!
  veNftValueWithdrawn: BigInt!
  # Marketplace (counts only, volume is per-token)
  listings: BigInt!
  sales: BigInt!
  # Token-specific stats
  tokenStats: [EpochTokenStats!]! @derivedFrom(field: "epochStats")
  # Timestamps
  lastUpdatedAt: BigInt!
}

type EpochTokenStats @entity {
  id: ID! # "{epoch}-{tokenAddress}"
  epochStats: EpochStats!
  token: Bytes!
  # Lending
  borrowed: BigInt!
  repaid: BigInt!
  # Rewards
  rewards: BigInt!
  # Marketplace
  salesVolume: BigInt!
}