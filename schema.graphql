type Portfolio @entity {
  id: ID! # portfolio address
  user: Account!
  factory: Bytes!
  createdAt: BigInt!
  currentLoanAmount: BigInt! @default(value: "0")
  totalBorrowed: BigInt! @default(value: "0")
  totalRepaid: BigInt! @default(value: "0")
  allTimeAssets: [String!]!
  facets: [Facet!]! @derivedFrom(field: "portfolio")

  manualBorrows: [Borrow!]! @derivedFrom(field: "portfolio")
  topups: [TopUp!]! @derivedFrom(field: "portfolio")

  loanPaids: [LoanPaid!]! @derivedFrom(field: "portfolio")
  gasReclamationPaids: [GasReclamationPaid!]! @derivedFrom(field: "portfolio")
  protocolFeePaids: [ProtocolFeePaid!]! @derivedFrom(field: "portfolio")
  zeroBalanceFeePaids: [ZeroBalanceFeePaid!]! @derivedFrom(field: "portfolio")
  lenderPremiumPaids: [LenderPremiumPaid!]! @derivedFrom(field: "portfolio")
  rewardsProcesseds: [RewardsProcessed!]! @derivedFrom(field: "portfolio")
  paidToRecipients: [PaidToRecipient!]! @derivedFrom(field: "portfolio")
  investedToVaults: [InvestedToVault!]! @derivedFrom(field: "portfolio")
  zeroBalanceRewardsProcesseds: [ZeroBalanceRewardsProcessed!]! @derivedFrom(field: "portfolio")
  debtPaids: [DebtPaid!]! @derivedFrom(field: "portfolio")
  transferFaileds: [TransferFailed!]! @derivedFrom(field: "portfolio")
  activeBalanceRewardsProcesseds: [ActiveBalanceRewardsProcessed!]! @derivedFrom(field: "portfolio")
  swapFaileds: [SwapFailed!]! @derivedFrom(field: "portfolio")
  investToVaultFaileds: [InvestToVaultFailed!]! @derivedFrom(field: "portfolio")
  increaseCollateralFaileds: [IncreaseCollateralFailed!]! @derivedFrom(field: "portfolio")
  manualRepayments: [ManualRepayment!]! @derivedFrom(field: "portfolio")

  lockCreateds: [LockCreated!]! @derivedFrom(field: "portfolio")
  lockIncreaseds: [LockIncreased!]! @derivedFrom(field: "portfolio")
  lockMerges: [LockMerge!]! @derivedFrom(field: "portfolio")

  deposits: [Deposit!]! @derivedFrom(field: "portfolio")
  withdrawals: [Withdrawal!]! @derivedFrom(field: "portfolio")

  userAssets: [UserAsset!]! @derivedFrom(field: "portfolio")
  settings: [Setting!]! @derivedFrom(field: "portfolio")


  activityHistoryItems: [ActivityHistoryItem!]! @derivedFrom(field: "portfolio")

  #Marketplace stuff
  listings: [Listing!]! @derivedFrom(field: "portfolio")
  saleProceeded: [SaleProceeded!]! @derivedFrom(field: "portfolio")
}

type Setting @entity {
  id: ID! # portfolioId
  portfolio: Portfolio!
  RewardsOption: RewardOption! @default(value: 0)
  TopUpEnabled: Boolean! @default(value: false)
  IsManualVoting: Boolean! @default(value: false)
  rewardsToken: Bytes
  recipient: Bytes
}

type RewardOption @entity {
  id: ID! # portfolioId
  portfolio: Portfolio!
  option: Int!
  percentage: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}

type ManualRepayment @entity {
  id: ID! # portfolio-{paymentIndex}
  portfolio: Portfolio!
  owner: Account!
  amount: BigInt!
  debtToken: Bytes!
  createdAt: BigInt!
  transactionHash: Bytes!
}

type Account @entity {
  id: ID! # user address
  portfolios: [Portfolio!]! @derivedFrom(field: "user")
}

type Facet @entity {
  id: ID! # portfolioId-facetAddress
  portfolio: Portfolio!
  facetAddress: Bytes!
  selectors: [Bytes!]!
  addedAt: BigInt!
  transactionHash: Bytes!
}

# VotingEscrowFacet Events
type LockCreated @entity {
  id: ID! # tokenId
  portfolio: Portfolio!
  tokenId: BigInt!
  owner: Account!
  amount: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}

type LockIncreased @entity {
  id: ID! # tokenId
  portfolio: Portfolio!
  tokenId: BigInt!
  owner: Account!
  amount: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}

# ERC20-portfolio events (e.g. YieldBasis ETH). Emitted by the portfolio diamond when a user
# deposits or withdraws the underlying asset. UserAsset.amount is updated as a running total.
type Deposit @entity {
  id: ID! # portfolio-blockNumber-logIndex
  portfolio: Portfolio!
  user: Account!
  amount: BigInt!
  sharesMinted: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}

type Withdrawal @entity {
  id: ID! # portfolio-blockNumber-logIndex
  portfolio: Portfolio!
  to: Account!
  amount: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}

type LockMerge @entity {
  id: ID! # tokenId-mergeIndex
  portfolio: Portfolio!
  fromTokenId: BigInt!
  toTokenId: BigInt!
  weightIncrease: BigInt!
  owner: Account!
  createdAt: BigInt!
  transactionHash: Bytes!
}

# VotingFacet Events
type Vote @entity {
  id: ID! # portfolio-tokenId-epoch
  epoch: BigInt!
  pools: [Bytes!]!
  weights: [BigInt!]!
  timestamp: BigInt!
  userAsset: UserAsset!
}


# LendingFacet Events
type Borrow @entity {
  id: ID! # portfolio-timestamp-logIndex
  portfolio: Portfolio!
  owner: Account!
  amount: BigInt!
  amountAfterFees: BigInt!
  originationFee: BigInt!
  debtToken: Bytes!
  to: Bytes # null for Borrowed, address for BorrowedTo
  createdAt: BigInt!
  transactionHash: Bytes!
}


type TopUp @entity {
  id: ID! # portfolio-{topUpIndex}
  portfolio: Portfolio!
  owner: Account!
  amount: BigInt!
  amountAfterFees: BigInt!
  originationFee: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}

# CollateralFacet Events
type CollateralEvent @entity {
  id: ID! # portfolio-tokenId-{eventIndex}
  portfolio: Portfolio!
  tokenId: BigInt!
  owner: Account!
  eventType: String! # "CollateralAdded" or "CollateralRemoved"
  createdAt: BigInt!
  transactionHash: Bytes!
}

# MarketplaceFacet Events
type Listing @entity {
  id: ID! # portfolio-tokenId
  portfolio: Portfolio!
  tokenId: BigInt!
  userAsset: UserAsset
  owner: Account!
  price: BigInt!
  paymentToken: Bytes!
  expiresAt: BigInt!
  allowedBuyer: Bytes
  nonce: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}

type ListingHistory @entity {
  id: ID! # portfolio-tokenId-timestamp
  portfolio: Portfolio!
  tokenId: BigInt!
  owner: Account!
  # UserAsset snapshot (not a reference)
  assetId: String!
  assetAmount: BigInt!
  assetType: String!
  # Listing details
  price: BigInt!
  paymentToken: Bytes!
  expiresAt: BigInt!
  allowedBuyer: Bytes
  nonce: BigInt!
  createdAt: BigInt!
  # Outcome
  outcome: String! # "Cancelled" or "Sold"
  cancelledAt: BigInt
  soldAt: BigInt
  soldTo: Account
  soldPrice: BigInt
  transactionHash: Bytes!
}

type Purchase @entity {
  id: ID! # portfolio-tokenId-{purchaseIndex}
  portfolio: Portfolio!
  tokenId: BigInt!
  seller: Portfolio!
  buyer: Bytes!
  price: BigInt!
  protocolFee: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}

type SaleProceeded @entity {
  id: ID!
  portfolio: Portfolio!
  tokenId: BigInt!
  buyerPortfolio: Bytes!
  paymentAmount: BigInt!
  debtPaid: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}


type ActivityHistoryItem @entity {
  id: ID! # portfolio-tokenId-epoch
  portfolio: Portfolio!
  epoch: BigInt!
  tokenId: BigInt!
  user: Account!
  lockedValue: BigInt!
  createdAt: BigInt!

  loanPaids: [LoanPaid!]! @derivedFrom(field: "activityHistoryItem")
  gasReclamationPaids: [GasReclamationPaid!]! @derivedFrom(field: "activityHistoryItem")
  protocolFeePaids: [ProtocolFeePaid!]! @derivedFrom(field: "activityHistoryItem")
  zeroBalanceFeePaids: [ZeroBalanceFeePaid!]! @derivedFrom(field: "activityHistoryItem")
  lenderPremiumPaids: [LenderPremiumPaid!]! @derivedFrom(field: "activityHistoryItem")
  rewardsProcesseds: [RewardsProcessed!]! @derivedFrom(field: "activityHistoryItem")
  paidToRecipients: [PaidToRecipient!]! @derivedFrom(field: "activityHistoryItem")
  investedToVaults: [InvestedToVault!]! @derivedFrom(field: "activityHistoryItem")
  zeroBalanceRewardsProcesseds: [ZeroBalanceRewardsProcessed!]! @derivedFrom(field: "activityHistoryItem")
  collateralIncreaseds: [CollateralIncreased!]! @derivedFrom(field: "activityHistoryItem")
  rebaseClaimeds: [RebaseClaimed!]! @derivedFrom(field: "activityHistoryItem")
  debtPaids: [DebtPaid!]! @derivedFrom(field: "activityHistoryItem")
  transferFaileds: [TransferFailed!]! @derivedFrom(field: "activityHistoryItem")
  activeBalanceRewardsProcesseds: [ActiveBalanceRewardsProcessed!]! @derivedFrom(field: "activityHistoryItem")
  swapFaileds: [SwapFailed!]! @derivedFrom(field: "activityHistoryItem")
  investToVaultFaileds: [InvestToVaultFailed!]! @derivedFrom(field: "activityHistoryItem")
  increaseCollateralFaileds: [IncreaseCollateralFailed!]! @derivedFrom(field: "activityHistoryItem")
}

