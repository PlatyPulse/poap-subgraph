type Portfolio @entity {
  id: ID! # portfolio address
  user: Account!
  factory: Bytes!
  createdAt: BigInt!
  currentLoanAmount: BigInt! @default(value: "0")
  totalBorrowed: BigInt! @default(value: "0")
  totalRepaid: BigInt! @default(value: "0")
  allTimeAssets: [String!]!
  facets: [Facet!]! @derivedFrom(field: "portfolio")

  manualBorrows: [Borrow!]! @derivedFrom(field: "portfolio")
  topups: [TopUp!]! @derivedFrom(field: "portfolio")

  loanPaids: [LoanPaid!]! @derivedFrom(field: "portfolio")
  gasReclamationPaids: [GasReclamationPaid!]! @derivedFrom(field: "portfolio")
  protocolFeePaids: [ProtocolFeePaid!]! @derivedFrom(field: "portfolio")
  zeroBalanceFeePaids: [ZeroBalanceFeePaid!]! @derivedFrom(field: "portfolio")
  lenderPremiumPaids: [LenderPremiumPaid!]! @derivedFrom(field: "portfolio")
  rewardsProcesseds: [RewardsProcessed!]! @derivedFrom(field: "portfolio")
  paidToRecipients: [PaidToRecipient!]! @derivedFrom(field: "portfolio")
  investedToVaults: [InvestedToVault!]! @derivedFrom(field: "portfolio")
  zeroBalanceRewardsProcesseds: [ZeroBalanceRewardsProcessed!]! @derivedFrom(field: "portfolio")
  automaticRepayments: [AutomaticRepayment!]! @derivedFrom(field: "portfolio")
  manualRepayments: [ManualRepayment!]! @derivedFrom(field: "portfolio")

  lockCreateds: [LockCreated!]! @derivedFrom(field: "portfolio")
  lockIncreaseds: [LockIncreased!]! @derivedFrom(field: "portfolio")
  lockMerges: [LockMerge!]! @derivedFrom(field: "portfolio")

  userAssets: [UserAsset!]! @derivedFrom(field: "portfolio")
  settings: [Setting!]! @derivedFrom(field: "portfolio")


  #Marketplace stuff
  listings: [Listing!]! @derivedFrom(field: "portfolio")
}

type Setting @entity {
  id: ID! # portfolioId
  portfolio: Portfolio!
  RewardsOption: RewardOption! @default(value: 0)
  TopUpEnabled: Boolean! @default(value: false)
  IsManualVoting: Boolean! @default(value: false)
}

type RewardOption @entity {
  id: ID! # portfolioId
  portfolio: Portfolio!
  option: Int!
  percentage: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}

type AutomaticRepayment @entity {
  id: ID! # tokenId-epoch OR portfolioId-epoch
  portfolio: Portfolio!
  epoch: BigInt!
  amount: BigInt!
  token: Bytes!
  createdAt: BigInt!
  transactionHash: Bytes!
}


type ManualRepayment @entity {
  id: ID! # portfolio-{paymentIndex}
  portfolio: Portfolio!
  owner: Account!
  amount: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}

type Account @entity {
  id: ID! # user address
  portfolios: [Portfolio!]! @derivedFrom(field: "user")
}

type Facet @entity {
  id: ID! # portfolioId-facetAddress
  portfolio: Portfolio!
  facetAddress: Bytes!
  selectors: [Bytes!]!
  addedAt: BigInt!
  transactionHash: Bytes!
}

# VotingEscrowFacet Events
type LockCreated @entity {
  id: ID! # tokenId
  portfolio: Portfolio!
  tokenId: BigInt!
  owner: Account!
  amount: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}

type LockIncreased @entity {
  id: ID! # tokenId
  portfolio: Portfolio!
  tokenId: BigInt!
  owner: Account!
  amount: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}

type LockMerge @entity {
  id: ID! # tokenId-mergeIndex
  portfolio: Portfolio!
  fromTokenId: BigInt!
  toTokenId: BigInt!
  weightIncrease: BigInt!
  owner: Account!
  createdAt: BigInt!
  transactionHash: Bytes!
}

# VotingFacet Events
type Vote @entity {
  id: ID! #tokenId-{epoch}
  epoch: BigInt!
  pools: [Bytes!]!
  weights: [BigInt!]!
  userAsset: UserAsset!
}


# LendingFacet Events
type Borrow @entity {
  id: ID! # portfolio-timestamp-logIndex
  portfolio: Portfolio!
  owner: Account!
  amount: BigInt!
  amountAfterFees: BigInt!
  originationFee: BigInt!
  to: Bytes # null for Borrowed, address for BorrowedTo
  createdAt: BigInt!
  transactionHash: Bytes!
}


type TopUp @entity {
  id: ID! # portfolio-{topUpIndex}
  portfolio: Portfolio!
  owner: Account!
  amount: BigInt!
  amountAfterFees: BigInt!
  originationFee: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}

# CollateralFacet Events
type CollateralEvent @entity {
  id: ID! # portfolio-tokenId-{eventIndex}
  portfolio: Portfolio!
  tokenId: BigInt!
  owner: Account!
  eventType: String! # "CollateralAdded" or "CollateralRemoved"
  createdAt: BigInt!
  transactionHash: Bytes!
}

# MarketplaceFacet Events
type Listing @entity {
  id: ID! # portfolio-tokenId
  portfolio: Portfolio!
  tokenId: BigInt!
  owner: Account!
  price: BigInt!
  paymentToken: Bytes!
  debtAttached: BigInt!
  expiresAt: BigInt!
  allowedBuyer: Bytes
  nonce: BigInt!
  status: String! # "Active", "Cancelled", "Sold"
  createdAt: BigInt!
  cancelledAt: BigInt
  soldAt: BigInt
  transactionHash: Bytes!
}

type Purchase @entity {
  id: ID! # portfolio-tokenId-{purchaseIndex}
  portfolio: Portfolio!
  tokenId: BigInt!
  seller: Account!
  buyer: Account!
  price: BigInt
  debtAmount: BigInt!
  unpaidFees: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}

type DebtTransfer @entity {
  id: ID! # portfolio-tokenId-{transferIndex}
  portfolio: Portfolio!
  tokenId: BigInt!
  buyer: Account!
  seller: Account!
  debtAmount: BigInt!
  unpaidFees: BigInt!
  createdAt: BigInt!
  transactionHash: Bytes!
}


type LoanPaid @entity {
  id: ID! # tokenId-epoch
  portfolio: Portfolio!
  epoch: BigInt!
  tokenId: BigInt!
  amount: [BigInt!]!
  user: Account!
  asset: [Bytes!]!
